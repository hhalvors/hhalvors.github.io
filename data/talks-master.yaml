# Talks — UNIFIED master catalog (DRAFT, single source of truth).
#
# Generated by merging cv.tex (authoritative talk list) with curated slide rows.
# NOT yet wired into the site build — review first. Each row = one engagement.
# `id` = stable join key (= deck filename stem where a deck exists). `cv_raw` is
# verbatim CV LaTeX kept as ground truth; structured fields are best-effort.
# Rows with `cv: false` are in the slides catalog but unmatched to a CV entry.

intro: |
  Slides from talks and lectures. The TeX and (Q)MD files are the
  source for the decks (Beamer and Quarto/Reveal.js respectively) ---
  feel free to re-use them.

  Open workshop: I use standard open-source tools to write these,
  e.g. pandoc. I've also played around with creating some further
  tools to simplify the process:
  [nordisk](https://github.com/hhalvors/nordisk) (write Beamer slide
  decks in Markdown) and
  [diagrams](https://github.com/hhalvors/diagrams) (for building the
  figures).


